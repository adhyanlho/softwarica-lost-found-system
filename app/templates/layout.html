<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Softwarica Lost & Found Portal{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>
    <header>
        <h2>Softwarica Lost & Found Portal</h2>
        <nav>
            {% if session.get('user_id') %}
                <span class="nav-text" style="color: white; margin-right: 15px;">Logged in as: <strong>{{ session.get('username') or 'User' }}</strong></span>
                <a href="{{ url_for('auth.logout') }}" class="btn-logout">Logout</a>
            {% else %}
                <a href="{{ url_for('auth.login') }}" class="btn-login">Login</a>
                <a href="{{ url_for('auth.register') }}" class="btn-register">Register</a>
            {% endif %}
        </nav>
    </header>
    <hr>

    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Select all flash message alert elements
        const alerts = document.querySelectorAll('.flash-alert');
        
        alerts.forEach(alert => {
            // Wait 3 seconds (3000ms) before starting the fade out
            setTimeout(() => {
                // Apply a smooth transitions wrapper effect
                alert.style.transition = 'opacity 0.6s ease, transform 0.6s ease, max-height 0.6s ease, margin 0.6s ease, padding 0.6s ease';
                alert.style.opacity = '0';
                alert.style.transform = 'translateY(-12px)';
                alert.style.maxHeight = '0px';
                alert.style.margin = '0px';
                alert.style.padding = '0px';
                
                // Completely drop the element from the DOM layout hierarchy after animation completes
                setTimeout(() => {
                    alert.remove();
                }, 600);
            }, 3000);
        });
    });
</script>
</body>
</html>
